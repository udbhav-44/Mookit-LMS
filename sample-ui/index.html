const HIGHER_ORDER = new Set(["analyze", "evaluate", "create"]);
function sendChatMessage(text) { $("input").value = text; $("chat").requestSubmit(); }

const QUESTION_TYPES = ["mcq_single", "mcq_multi", "true_false", "fib", "descriptive"];

function renderQuizQuestion(q, idx, editable) {
  const stem = q.questionText || q.stem || "(no question text)";
  const higherOrder = HIGHER_ORDER.has(q.bloom_level);
  let html = `<div class="quiz-q" data-qidx="${idx}">`;
  html += `<div class="q-num">Question ${idx + 1} · ${escapeHtml(q.questionType || "unknown")}`;
  if (q.bloom_level) html += ` · <span class="q-bloom"${higherOrder ? ' data-higher="1"' : ""}>${escapeHtml(q.bloom_level)}</span>`;
  html += `</div><div class="q-stem">${escapeHtml(stem)}</div>`;
  if (q.diagram && q.diagram.file_id && q.diagram.diagram_file) {
    const d = q.diagram;
    const cap = d.description ? escapeHtml(d.description) : "Figure for this question";
    html += `<figure class="q-diagram">
      <img class="q-diagram-img" data-file="${escapeHtml(d.file_id)}" data-diag="${escapeHtml(d.diagram_file)}" alt="${cap}" title="${cap}">
      <figcaption>📎 ${cap}${d.question_number ? ` · ${escapeHtml(String(d.question_number))}` : ""}</figcaption>
    </figure>`;
  }
  const opts = q.options || [];
  if (opts.length) {
    for (const o of opts) {
      const correct = o.isCorrect === true || o.isCorrect === 1;
      html += `<div class="q-opt${correct ? " correct" : ""}">${correct ? "✓ " : "○ "}${escapeHtml(o.optionText || "")}`;
      if (o.misconception) html += ` <span style="color:var(--muted)">— ${escapeHtml(o.misconception)}</span>`;
      html += `</div>`;
    }
  } else if (q.questionType === "true_false" && q.trueFalseAnswer != null) {
    html += `<div class="q-opt correct">Answer: ${q.trueFalseAnswer ? "True" : "False"}</div>`;
  } else if (q.fibUseRange) {
    html += `<div class="q-meta">Numeric answer in [${q.fibRangeLower}, ${q.fibRangeUpper}]${q.solution?.unit ? " " + escapeHtml(q.solution.unit) : ""}</div>`;
  } else if (q.blanks) {
    html += `<div class="q-meta">Fill-in-the-blank: ${escapeHtml((q.blanks || []).flatMap(b => (b.answers || []).map(a => a.answerText)).join(", "))}</div>`;
  }
  if (q.solution && q.solution.solution_expr)
    html += `<div class="q-meta">Worked solution: ${escapeHtml(q.solution.solution_expr)} = ${q.solution.answer}${q.solution.unit ? " " + escapeHtml(q.solution.unit) : ""}</div>`;
  // Descriptive rubric (if present).
  const rubric = q.rubric || q.scoring_rubric;
  if (rubric && (rubric.criteria || Array.isArray(rubric))) {
    const crit = rubric.criteria || rubric;
    if (Array.isArray(crit) && crit.length) {
      html += `<div class="rubric"><strong>Rubric</strong><table><tr><th>Criterion</th><th>Pts</th></tr>` +
        crit.map(c => `<tr><td>${escapeHtml(c.criterion || c.descriptor || c.name || "")}</td><td>${escapeHtml(String(c.points ?? c.score ?? ""))}</td></tr>`).join("") +
        `</table></div>`;
    }
  }
  // Marks line.
  if (q.score != null || q.negativeScore != null) {
    html += `<div class="q-meta">Marks: ${escapeHtml(String(q.score ?? "?"))}${q.negativeScore ? ` · negative ${escapeHtml(String(q.negativeScore))}` : ""}</div>`;
  }
  const cite = q.citation;
  const nCites = Array.isArray(q.citations) ? q.citations.length : (cite ? 1 : 0);
  if (cite && cite.quote) {
    const docName = cite.source_doc_id ? escapeHtml(lookupFileName(cite.source_doc_id)) : "";
    html += `<div class="q-cite">Source${docName ? ` · ${docName}` : ""}${nCites > 1 ? ` · ${nCites} spans` : ""}: “${escapeHtml(String(cite.quote).slice(0, 200))}${cite.quote.length > 200 ? "…" : ""}”`;
    if (editable) html += ` <button type="button" data-op="view_source" style="font-size:10px;padding:2px 6px">View source</button>`;
    html += `</div>`;
  }
  if (editable) {
    const typeOpts = QUESTION_TYPES.map(t => `<option value="${t}"${t === q.questionType ? " selected" : ""}>${t}</option>`).join("");
    html += `<div class="q-edit-actions">
      <button data-op="edit_text">✏️ Edit text</button>
      <button data-op="regenerate">↻ Regenerate</button>
      <button data-op="regenerate_note" title="Regenerate with a specific instruction">↻ with note…</button>
      <button data-op="replace_similar">⇄ Replace</button>
      <select data-op="change_type" title="Change type">${typeOpts}</select>
      <button data-op="flag">⚑ Flag</button>
      <span class="q-spacer"></span>
      <button class="q-danger" data-op="remove">🗑 Delete</button>
    </div>`;
  }
  html += `</div>`;
  return html;
}

// Unambiguous publish instruction bound to a specific draft id — prevents the model from
// publishing a different/older draft or re-creating one when several drafts exist in the session.
function publishDraftMessage(artifactId) {
  return `Publish the existing quiz draft with id "${artifactId}" to the course. `
    + `Publish exactly that draft as-is — do not create a new quiz and do not change the questions.`;
}

function attachDraftActions(card, buttons, artifactId) {
  const row = document.createElement("div");
  row.className = "draft-actions";
  for (const b of buttons) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = b.secondary ? "secondary" : (b.danger ? "danger" : "");
    btn.textContent = b.label;
    if (b.resource) gate(btn, b.resource, b.action);
    if (b.directOp && artifactId) {
      btn.onclick = () => editQuiz(card, artifactId, b.directOp, b.extra || {});
    } else if (b.publish && artifactId) {
      // Target THIS exact draft so the model can't publish a different/stale one.
      btn.onclick = () => sendChatMessage(publishDraftMessage(artifactId));
    } else if (b.message) {
      btn.onclick = () => sendChatMessage(b.message);
    }
    row.appendChild(btn);
  }
  card.appendChild(row);
  scrollLog();
}

// ---- Quiz draft rendering + clickable per-question editing -------------
function draftPreviewFromPayload(title, payload) {
  const qs = (payload && payload.questions) || [];
  return { title, warnings: (payload && payload.warnings) || [], summary_lines: [`${qs.length} question(s)`] };
}

function renderDraftCard(card, p, payload, artifactId, version, provenance) {
  const questions = payload.questions || [];
  const title = (p.title || "").replace(/^Publish assessment:\s*/i, "") || "Quiz draft";
  const sources = payload.source_artifact_ids || (payload.source_artifact_id ? [payload.source_artifact_id] : []);
  const prov = provenance || payload.provenance || {};
  const provLabel = prov.edited_by_human ? "AI-generated · edited by you" : "AI-generated";
  const canEdit = Boolean(artifactId) && can("assessments", "update");
  let html = `<div class="draft-title">📝 Quiz draft: ${escapeHtml(title)}${version ? ` <span style="color:var(--muted);font-weight:400">v${version}</span>` : ""}`;
  html += `<span class="provenance-badge">${escapeHtml(provLabel)}</span></div>`;
  html += `<div style="color:var(--muted);font-size:12px;margin-bottom:10px">Review and edit each question below. Nothing is on mooKIT until you publish and confirm.</div>`;
  if (sources.length > 1) {
    const names = sources.map((id) => lookupFileName(id)).join(", ");
    html += `<div style="color:var(--muted);font-size:12px;margin-bottom:8px">Sources: ${sources.length} documents — ${escapeHtml(names)}</div>`;
  } else if (sources.length === 1) {
    html += `<div style="color:var(--muted);font-size:12px;margin-bottom:8px">Source: ${escapeHtml(lookupFileName(sources[0]))}</div>`;
  }
  if (canEdit) {
    const addTypeOpts = QUESTION_TYPES.map(t => `<option value="${t}">${t}</option>`).join("");
    html += `<div class="draft-knobs"><label>Difficulty (whole quiz) <select id="difficulty-${artifactId}">
      <option value="easy">easy</option><option value="medium" selected>medium</option>
      <option value="hard">hard</option><option value="mixed">mixed</option></select></label>
      <label>Add <select id="add-type-${artifactId}">${addTypeOpts}</select>
      <select id="add-count-${artifactId}"><option>1</option><option>2</option><option>3</option></select></label>
      <button type="button" class="secondary" id="add-q-${artifactId}">+ Add question(s)</button></div>`;
  }
  if (p.summary_lines && p.summary_lines.length)
    html += "<ul style='margin:8px 0;padding-left:18px;color:var(--muted)'>" +
      p.summary_lines.map(s => `<li>${escapeHtml(s)}</li>`).join("") + "</ul>";
  if (!questions.length)
    html += `<div class="draft-body" style="color:var(--warn)">No questions in this draft yet.</div>`;
  else
    html += questions.map((q, i) => renderQuizQuestion(q, i, canEdit)).join("");
  card.innerHTML = html;
  card._quizPayload = payload;
  loadQuestionDiagrams(card);
  if (canEdit) {
    const diffSel = card.querySelector("#difficulty-" + artifactId);
    if (diffSel) diffSel.onchange = () => editQuiz(card, artifactId, "set_difficulty", { difficulty: diffSel.value });
    const addBtn = card.querySelector("#add-q-" + artifactId);
    if (addBtn) addBtn.onclick = () => {
      const qtype = card.querySelector("#add-type-" + artifactId).value;
      const delta = Number(card.querySelector("#add-count-" + artifactId).value) || 1;
      editQuiz(card, artifactId, "add", { qtype, delta });
    };
  }
  if (p.warnings && p.warnings.length) {
    const w = document.createElement("ul");
    w.style.cssText = "color:var(--warn);margin:8px 0;padding-left:18px";
    w.innerHTML = p.warnings.map(x => `<li>⚠ ${escapeHtml(x)}</li>`).join("");
    card.appendChild(w);
  }
  attachDraftActions(card, [
    { label: "Publish to mooKIT", publish: true, resource: "assessments", action: "publish" },
    { label: "Add 2 questions", directOp: "add", extra: { qtype: "mcq_single", delta: 2 }, secondary: true },
    { label: "Make harder", directOp: "set_difficulty", extra: { difficulty: "hard" }, secondary: true },
    { label: "Keep as draft", message: "Keep it as a draft for now", secondary: true },
  ], canEdit ? artifactId : null);
}

function setupQuizEditing(card, artifactId) {
  if (!artifactId || card.dataset.editingWired) return;
  card.dataset.editingWired = "1";
  card.addEventListener("click", async (e) => {
    const srcBtn = e.target.closest("button[data-op='view_source']");
    if (srcBtn) {
      const wrap = srcBtn.closest(".quiz-q");
      const index = Number(wrap.getAttribute("data-qidx"));
      const q = (card._quizPayload?.questions || [])[index];
      if (q?.citation) showSourceModal(q.citation);
      return;
    }
    const btn = e.target.closest("button[data-op]");
    if (!btn) return;
    const wrap = btn.closest(".quiz-q");
    if (!wrap) return;
    const index = Number(wrap.getAttribute("data-qidx"));
    const op = btn.getAttribute("data-op");
    if (op === "edit_text") {
      const cur = wrap.querySelector(".q-stem")?.textContent || "";
      const nt = await promptModal("Edit question text", cur, { multiline: true });
      if (nt != null && nt.trim() && nt !== cur) editQuiz(card, artifactId, "edit_text", { index, questionText: nt });
    } else if (op === "regenerate_note") {
      const note = await promptModal("Regenerate this question with an instruction", "", { multiline: true });
      if (note != null && note.trim()) editQuiz(card, artifactId, "regenerate", { index, instruction: note });
    } else if (op === "flag") {
      editQuiz(card, artifactId, "flag", { index, reason: "instructor_flag" });
    } else if (op === "remove") {
      if (await confirmModal("Delete question", "Delete question " + (index + 1) + "? This cannot be undone.")) editQuiz(card, artifactId, "remove", { index });
    } else {
      editQuiz(card, artifactId, op, { index });   // regenerate | replace_similar
    }
  });
  card.addEventListener("change", (e) => {
    const sel = e.target.closest("select[data-op='change_type']");
    if (!sel) return;
    const wrap = sel.closest(".quiz-q");
    editQuiz(card, artifactId, "change_type", { index: Number(wrap.getAttribute("data-qidx")), qtype: sel.value });
  });
}

async function editAnnouncement(draftId, title, description) {
  const r = await fetch(`${baseUrl()}/v1/announcement/${draftId}/edit`, {
    method: "POST",
    headers: headers({ "Content-Type": "application/json" }),
    body: JSON.stringify({ title, description }),
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.detail || r.statusText || ("HTTP " + r.status));
  return j;
}

async function editQuiz(card, artifactId, op, extra = {}) {
  card.style.opacity = ".5";
  try {
    const r = await fetch(`${baseUrl()}/v1/quiz/${artifactId}/edit`, {
      method: "POST", headers: headers({ "Content-Type": "application/json" }),
      body: JSON.stringify(Object.assign({ op }, extra)),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.success === false) {
      surfaceError(r.status, j.detail || j.message, "quiz edit");
      return;
    }
    const payload = j.payload || {};
    card._quizPayload = payload;
    renderDraftCard(card, draftPreviewFromPayload(j.title || "Quiz draft", payload), payload, artifactId, j.version, j.provenance);
    addChip(`✏️ ${op} applied (v${j.version})`, "artifact");
  } catch (e) {
    surfaceError(0, e.message, "quiz edit");
  } finally {
    card.style.opacity = "";
  }
}

function showArtifactPreview(p, type, payload, artifactId, version) {
  const card = document.createElement("div");
  card.className = "msg assistant draft-preview";
  let html = "";
  if (type === "assessment_draft" && payload) {
    setupQuizEditing(card, artifactId);
    renderDraftCard(card, p, payload, artifactId, version, payload.provenance);
    log.appendChild(card);
    scrollLog();
    return;
  }
  if (type === "lecture_draft" && payload) {
    const title = payload.title || p.title || "Lecture draft";
    html += `<div class="draft-title">🎬 Lecture draft: ${escapeHtml(title)}</div>`;
    html += `<div style="color:var(--muted);font-size:12px;margin-bottom:10px">Nothing is on mooKIT until you publish and confirm. The video is uploaded to mooKIT at confirm time.</div>`;
    if (payload.ambiguous)
      html += `<div class="draft-body" style="color:var(--warn)">⚠ The week “${escapeHtml(payload.week_label||"")}” wasn't matched to a course week — tell me which week before publishing.</div>`;
    if (p.summary_lines && p.summary_lines.length)
      html += "<ul style='margin:8px 0;padding-left:18px;color:var(--muted)'>" +
        p.summary_lines.map(s => `<li>${escapeHtml(s)}</li>`).join("") + "</ul>";
    if (p.diff && p.diff.length) {
      html += `<table class="diff" style="margin-top:10px"><tr><th>Field</th><th>Value</th></tr>` +
        p.diff.map(r => `<tr><td>${escapeHtml(r.field)}</td><td>${escapeHtml(String(r.after ?? "—"))}</td></tr>`).join("") +
        `</table>`;
    }
    if (payload.week_label)
      html += `<div class="draft-body"><strong>Week:</strong> ${escapeHtml(payload.week_label)}</div>`;
    if (payload.module_label)
      html += `<div class="draft-body" style="margin-top:8px"><strong>Module:</strong> ${escapeHtml(payload.module_label)}</div>`;
    if (payload.file_artifact_id) {
      const vidName = lookupFileName(payload.file_artifact_id);
      html += `<div style="font-size:12px;color:var(--muted);margin-top:8px">Video: <strong>${escapeHtml(vidName)}</strong> <code>${escapeHtml(payload.file_artifact_id)}</code></div>`;
      const vidFile = uploadedFiles.find((f) => f.id === payload.file_artifact_id);
      if (vidFile?.localBlobUrl) {
        html += `<div class="video-preview"><video controls src="${vidFile.localBlobUrl}"></video></div>`;
      }
    }
    card.innerHTML = html;
    attachDraftActions(card, [
      { label: "Publish lecture to mooKIT", message: "Publish this lecture draft to the course", resource: "lectures", action: "create" },
      { label: "Change week/title", message: "Change the week or title for this lecture draft", secondary: true },
      { label: "Keep as draft", message: "Keep it as a draft for now", secondary: true },
    ], null);
    log.appendChild(card);
    scrollLog();
    return;
  }
  if (type === "announcement_draft" && payload) {
    html += `<div class="draft-title">📋 Draft announcement</div>`;
    html += `<div style="color:var(--muted);font-size:12px;margin-bottom:10px">Edit the subject/body below, then send. This is exactly what will be posted to mooKIT if you confirm.</div>`;
    if (p.audience) html += `<div class="audience">To: ${escapeHtml(p.audience)}</div>`;
    html += `<div style="font-size:12px;color:var(--muted);margin-top:8px">Subject (mooKIT <code>title</code>)</div>`;
    html += `<input class="editable-field" id="ann-subject-${artifactId||'x'}" value="${escapeHtml(payload.title || "")}" />`;
    html += `<div style="font-size:12px;color:var(--muted);margin-top:10px">Body (mooKIT <code>description</code>)</div>`;
    html += `<textarea class="editable-field body" id="ann-body-${artifactId||'x'}">${escapeHtml(payload.description || "")}</textarea>`;
    card.innerHTML = html;
    const subjEl = card.querySelector(`#ann-subject-${artifactId||'x'}`);
    const bodyEl = card.querySelector(`#ann-body-${artifactId||'x'}`);
    attachDraftActions(card, [
      { label: "Send to students", resource: "announcements", action: "publish" },
      { label: "Save edits", secondary: true },
      { label: "Keep as draft", message: "Keep it as a draft for now", secondary: true },
    ], null);
    const btns = [...card.querySelectorAll(".draft-actions button")];
    const sendBtn = btns[0];
    const saveBtn = btns[1];
    gate(sendBtn, "announcements", "publish");
    sendBtn.onclick = async () => {
      if (!artifactId) { sendChatMessage("Yes, send the announcement to all students"); return; }
      try {
        sendBtn.disabled = true;
        await editAnnouncement(artifactId, subjEl.value.trim(), bodyEl.value.trim());
        sendChatMessage("Yes, send the announcement to all students");
      } catch (e) { surfaceError(0, e.message, "save announcement"); }
      finally { sendBtn.disabled = false; }
    };
    saveBtn.onclick = async () => {
      if (!artifactId) return;
      try {
        saveBtn.disabled = true;
        const j = await editAnnouncement(artifactId, subjEl.value.trim(), bodyEl.value.trim());
        addChip(`✏️ announcement saved (v${j.version})`, "artifact");
      } catch (e) { surfaceError(0, e.message, "save announcement"); }
      finally { saveBtn.disabled = false; }
    };
    log.appendChild(card);
    scrollLog();
    return;
  } else {
    html += `<div class="draft-title">📋 ${escapeHtml(p.title || type)}</div>`;
    if (p.audience) html += `<div class="audience">To: ${escapeHtml(p.audience)}</div>`;
    if (p.summary_lines && p.summary_lines.length)
      html += "<ul style='margin:8px 0;padding-left:18px;color:var(--muted)'>" +
        p.summary_lines.map(s => `<li>${escapeHtml(s)}</li>`).join("") + "</ul>";
    if (p.body_markdown)
      html += `<div class="draft-body">${escapeHtml(p.body_markdown)}</div>`;
  }
  if (p.warnings && p.warnings.length)
    html += "<ul style='color:var(--warn);margin:8px 0'>" +
      p.warnings.map(w => `<li>⚠ ${escapeHtml(w)}</li>`).join("") + "</ul>";
  card.innerHTML = html;
  log.appendChild(card);
  scrollLog();
}

// ---- Chat (SSE over fetch streaming) -----------------------------------
async function loadMeta() {
  const banner = $("meta-banner");
  try {
    const r = await fetch(baseUrl() + "/v1/meta", { headers: headers() });
    if (!r.ok) {
      if (r.status === 401) {
        banner.innerHTML = '<span class="badge warn">Missing course / token / uid — fill header fields</span>';
        banner.classList.add("show");
      }
      return;
    }
    const st = await r.json();
    appMeta = st.data || st;
    const qf = appMeta.quizFeatures || {};
    const maxMb = Math.round((appMeta.limits?.maxFileSizeBytes || 0) / (1024 * 1024));
    const mode = qf.blueprintEnabled ? "Blueprint pipeline" : "Legacy pipeline";
    const badges = [
      `<span class="badge${qf.blueprintEnabled ? " on" : ""}">${mode}</span>`,
      qf.blueprintEnabled && qf.visionEnabled ? '<span class="badge on">Vision</span>' : "",
      maxMb ? `<span class="badge">Max upload ${maxMb} MB</span>` : "",
    ];
    if (appMeta.permissionsOk === false) {
      badges.push(`<span class="badge warn">No mooKIT permissions — check course (${escapeHtml(appMeta.courseId || "?")}), token, uid (${appMeta.userId ?? "?"})</span>`);
    } else if (appMeta.permissions) {
      const allowed = Object.keys(appMeta.permissions).filter((k) => (appMeta.permissions[k] || []).length).join(", ");
      if (allowed) badges.push(`<span class="badge">Allowed: ${escapeHtml(allowed)}</span>`);
    }
    banner.innerHTML = badges.filter(Boolean).join(" ");
    banner.classList.add("show");
  } catch (_) { /* non-fatal */ }
}

    base: $("cfg-base").value.trim(), course: $("cfg-course").value.trim(),
    uid: $("cfg-uid").value.trim(), token: $("cfg-token").value.trim(), sessionId,

function clearChatUI() {
  log.innerHTML = "";
  uploadedFiles.forEach((f) => f.localBlobUrl && URL.revokeObjectURL(f.localBlobUrl));
  uploadedFiles = []; offeredActionsKey = ""; $("file-list").innerHTML = "";
  draftArtifacts = []; pendingRefs = [];
  renderRefChips(); renderArtifactsPanel(); updateFilesPanelSummary();
}
function newSession() {
  sessionId = "sess-" + Math.random().toString(36).slice(2);
  clearChatUI(); persistCfg(); renderEmptyState();
  loadSessionList();
}
// Reopen a previous chat: restore its transcript (Redis-hot or Postgres-cold) + per-chat context.
async function openSession(id) {
  if (!id || id === sessionId) return;
  sessionId = id; persistCfg(); clearChatUI();
  await restoreSession();
  await loadSessionArtifacts();
}
async function restoreSession() {
  try {
    const r = await fetch(baseUrl() + "/v1/sessions/" + encodeURIComponent(sessionId), { headers: headers() });
    if (!r.ok) { renderEmptyState(); return; }
    const st = await r.json();
    const data = st.data || st;
    const msgs = data.messages || [];
    if (!msgs.length) { renderEmptyState(); return; }
    for (const m of msgs) addMsg(m.role === "user" ? "user" : "assistant", m.content || "");
    addChip("↺ restored " + msgs.length + " message(s) from this chat", "");
  } catch (_) { renderEmptyState(); }
}
// Rebuild the "this chat" context (uploads + drafts) for a reopened session.
async function loadSessionArtifacts() {
  try {
    const r = await fetch(baseUrl() + "/v1/sessions/" + encodeURIComponent(sessionId) + "/artifacts", { headers: headers() });
    if (!r.ok) return;
    const st = await r.json();
    const data = st.data || st;
    for (const u of (data.uploads || [])) {
      registerReadyFile({ id: u.id, name: u.title, kind: u.kind || "document", textReady: true, diagramsReady: true, phaseText: "restored" });
    }
    for (const d of (data.drafts || [])) {
      upsertDraftArtifact({ artifact_id: d.id, type: d.type, version: d.version, preview: { title: d.title } });
    }
    renderArtifactsPanel();
  } catch (_) { /* non-fatal */ }
}
// Populate the header "Recent chats" picker from the durable history list.
async function loadSessionList() {
  const sel = $("session-picker");
  if (!sel || !$("cfg-token").value.trim()) return;
  try {
    const r = await fetch(baseUrl() + "/v1/sessions?limit=50", { headers: headers() });
    if (!r.ok) return;
    const st = await r.json();
    const list = (st.data || st).sessions || [];
    sel.innerHTML = `<option value="">▾ Recent chats (${list.length})</option>` +
      list.map((s) => `<option value="${escapeHtml(s.id)}"${s.id === sessionId ? " selected" : ""}>` +
        `${escapeHtml(s.title || "New chat")} · ${s.messageCount || 0} msg</option>`).join("");
  } catch (_) { /* non-fatal */ }
}

(function initConfig() {
  const params = new URLSearchParams(location.search);
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem("mookit-ui-cfg") || "{}"); } catch {}
  const origin = location.origin;
  if (origin && origin !== "null" && !origin.startsWith("file:")) {
    $("cfg-base").placeholder = origin;
    $("cfg-base").value = saved.base || origin;
  } else {
    $("cfg-base").value = saved.base || "http://localhost:8000";
  }
  if (saved.course) $("cfg-course").value = saved.course;
  if (saved.uid) $("cfg-uid").value = saved.uid;
  const token = params.get("token") || saved.token || "";
  if (token) $("cfg-token").value = token;
  sessionId = saved.sessionId || ("sess-" + Math.random().toString(36).slice(2));
  ["cfg-base", "cfg-course", "cfg-uid", "cfg-token"].forEach((id) => {
    $(id).addEventListener("change", () => { persistCfg(); loadMeta(); loadTaxonomy(); });
    $(id).addEventListener("input", persistCfg);
  });
  $("new-session").onclick = newSession;
  $("session-picker").onchange = (e) => { if (e.target.value) openSession(e.target.value); };
  persistCfg();
  loadMeta().then(() => { loadTaxonomy(); loadSessionList(); return restoreSession(); });
})();

function parseSseFrames(buffer) {
  const norm = buffer.replace(/\r\n/g, "\n");
  const parts = norm.split("\n\n");
  const rest = parts.pop() || "";
  return { frames: parts.filter(Boolean), rest };
}

// Coalesce repeated tool chips (keyed by tool) so progress doesn't flood the log.
function upsertToolChip(state, tool, text) {
  let chip = state.toolChips[tool];
  if (!chip || !chip.isConnected) { chip = addChip(text, "tool"); state.toolChips[tool] = chip; }
  else chip.textContent = text;
}

function addSkeleton() {
  clearEmptyState();
  const el = document.createElement("div");
  el.className = "msg assistant skeleton";
  el.innerHTML = `<div class="bar"></div><div class="bar"></div><div class="bar short"></div>`;
  log.appendChild(el); scrollLog();
  return el;
}

function handleSseFrame(frame, state) {
  let ev = "message", data = "";
  for (const line of frame.split("\n")) {
    if (!line || line.startsWith(":")) continue;
    if (line.startsWith("event:")) ev = line.slice(6).trim();
    else if (line.startsWith("data:")) data += (data ? "\n" : "") + line.slice(5).trim();
  }
  if (!data || data === "ping") return;
  let d;
  try { d = JSON.parse(data); } catch (err) {
    console.warn("SSE JSON parse failed", data, err);
    return;
  }
  if (ev === "assistant_delta") {
    if (state.skeletonEl) { state.skeletonEl.remove(); state.skeletonEl = null; }
    if (!state.assistantEl) { state.assistantEl = addMsg("assistant", ""); state.assistantRaw = ""; }
    state.assistantRaw += d.text || "";
    setAssistantText(state.assistantEl, state.assistantRaw);
    scrollLog();
  } else if (ev === "tool_started") {
    if (!state.skeletonEl && /quiz|assessment|announcement|lecture|draft|create/i.test(d.tool || d.label || "")) state.skeletonEl = addSkeleton();
    upsertToolChip(state, d.tool || "tool", "🔧 " + (d.label || d.tool));
  } else if (ev === "tool_progress") {
    upsertToolChip(state, d.tool || "tool", `… ${d.tool}: ${d.message || (d.pct+"%")}`);
  } else if (ev === "artifact_updated") {
    if (state.skeletonEl) { state.skeletonEl.remove(); state.skeletonEl = null; }
    state.lastArtifactType = d.type;
    state.lastArtifactId = d.artifact_id;
    if (String(d.type || "").endsWith("_draft")) upsertDraftArtifact(d);
    addChip(`📝 ${d.type} updated (v${d.version})`, "artifact");
    if (d.preview) showArtifactPreview(d.preview, d.type, d.payload, d.artifact_id, d.version);
  } else if (ev === "pending_confirmation") {
    if (state.skeletonEl) { state.skeletonEl.remove(); state.skeletonEl = null; }
    showConfirm(d);
  } else if (ev === "clarification") {
    if (state.skeletonEl) { state.skeletonEl.remove(); state.skeletonEl = null; }
    state.sawClarification = true;
    showClarification(d);
  } else if (ev === "error") {
    if (state.skeletonEl) { state.skeletonEl.remove(); state.skeletonEl = null; }
    surfaceError(0, d.message || d.code || JSON.stringify(d), "assistant");
  } else if (ev === "done") {
    if (state.skeletonEl) { state.skeletonEl.remove(); state.skeletonEl = null; }
    if (!state.sawDone) { state.sawDone = true; addChip("✓ turn complete", ""); loadSessionList(); }
  }
}

// ---- Wire @-mention + artifacts panel --------------------------------------
$("artifacts-toggle").onclick = () => {
  const list = $("artifacts-list");
  const open = list.classList.toggle("show");
  $("artifacts-toggle").setAttribute("aria-expanded", String(open));
};
$("input").addEventListener("input", showMentionPop);
$("input").addEventListener("keydown", (e) => {
  const pop = $("mention-pop");
  if (!pop.classList.contains("show") || !pop._cands || !pop._cands.length) return;
  if (e.key === "ArrowDown") { e.preventDefault(); mentionActive = (mentionActive + 1) % pop._cands.length; highlightMention(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); mentionActive = (mentionActive - 1 + pop._cands.length) % pop._cands.length; highlightMention(); }
  else if (e.key === "Enter" || e.key === "Tab") { if (mentionActive >= 0) { e.preventDefault(); pickMention(pop._cands[mentionActive].id); } }
  else if (e.key === "Escape") { e.preventDefault(); hideMentionPop(); }
});
document.addEventListener("click", (e) => {
  if (!e.target.closest("#mention-pop") && e.target !== $("input")) hideMentionPop();
});
renderArtifactsPanel();

$("chat").onsubmit = async (e) => {
  e.preventDefault();
  hideMentionPop();
  const text = $("input").value.trim();
  const refs = pendingRefs.slice();
  if (!text && !refs.length) return;
  if (!$("cfg-token").value.trim()) {
    surfaceError(401, null, "chat");
    return;
  }
  $("input").value = "";
  // Readable echo of what was explicitly tagged; the references[] array is authoritative.
  const displayText = refs.length
    ? (text + (text ? "\n\n" : "") + "(@-tagged: " + refs.map((r) => r.title).join(", ") + ")")
    : text;
  lastUserText = text;
  pendingRefs = []; renderRefChips(); renderArtifactsPanel();
  $("send").disabled = true;
  $("cancel").style.display = "";
  chatAbort = new AbortController();
  addMsg("user", displayText);
  const state = { assistantEl: null, assistantRaw: "", skeletonEl: null, sawDone: false, lastArtifactType: null, lastArtifactId: null, toolChips: {} };

  try {
    const r = await fetch(baseUrl() + "/v1/chat", {
      method:"POST", headers: headers({"Content-Type":"application/json"}),
      body: JSON.stringify({ message: displayText, sessionId, references: refs.map((r) => r.id) }),
      signal: chatAbort.signal,
    });
    if (!r.ok) { let detail=""; try{ detail=(await r.json()).detail; }catch{ detail=await r.text().catch(()=>"" ); } surfaceError(r.status, detail, "chat"); return; }
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream:true });
      const parsed = parseSseFrames(buf);
      buf = parsed.rest;
      for (const frame of parsed.frames) handleSseFrame(frame, state);
    }
    if (buf.trim()) {
      const parsed = parseSseFrames(buf + "\n\n");
      for (const frame of parsed.frames) handleSseFrame(frame, state);
    }
    if (!state.assistantEl && !state.sawClarification) addChip("(no assistant text — check tool chips above)", "");
    if (state.lastArtifactType === "assessment_draft") {
      const publishMsg = state.lastArtifactId
        ? publishDraftMessage(state.lastArtifactId)
        : "Publish this quiz draft to the course";
      addQuickActions([
        { label: "Publish quiz to mooKIT", message: publishMsg, resource: "assessments", action: "publish" },
        { label: "Add 2 more questions", message: "Add 2 more mcq_single questions to this quiz", secondary: true },
        { label: "Keep as draft", message: "Keep it as a draft for now", secondary: true },
      ]);
    } else if (state.lastArtifactType === "lecture_draft") {
      addQuickActions([
        { label: "Publish lecture to mooKIT", message: "Publish this lecture draft to the course", resource: "lectures", action: "create" },
        { label: "Keep as draft", message: "Keep it as a draft for now", secondary: true },
      ]);
    } else if (state.lastArtifactType === "announcement_draft") {
      addQuickActions([
        { label: "Yes — send announcement", message: "Yes, send the announcement to all students", resource: "announcements", action: "publish" },
        { label: "Keep as draft", message: "Keep it as a draft for now", secondary: true },
      ]);
    }
  } catch (e) {
    if (e.name === "AbortError") {
      addChip("🚫 request cancelled", "");
    } else {
      let msg = e.message || String(e);
      if (msg === "Failed to fetch") {
        msg = "cannot reach " + baseUrl() + " — use this page's host in Service URL (not localhost) and ensure the API container is running";
      }
      surfaceError(0, msg, "chat");
    }
  } finally {
    chatAbort = null;
    $("send").disabled = false;
    $("cancel").style.display = "none";
    $("input").focus();
  }
};

$("cancel").onclick = () => { if (chatAbort) chatAbort.abort(); };
</script>

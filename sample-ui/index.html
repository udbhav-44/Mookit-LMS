<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>mooKIT AI Assistant — Sample Chat</title>
<style>
  :root { --bg:#0f1117; --panel:#171a23; --panel2:#1f2330; --txt:#e8eaf0; --muted:#9aa3b8;
          --accent:#5b8cff; --accent2:#3fb98f; --warn:#e0a93f; --danger:#e0603f; --border:#2a2f3d; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:12px 18px; background:var(--panel); border-bottom:1px solid var(--border);
           display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .sub { color:var(--muted); font-size:12px; }
  .cfg { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .cfg input { background:var(--panel2); border:1px solid var(--border); color:var(--txt);
               border-radius:6px; padding:5px 8px; font-size:12px; width:150px; }
  .cfg select { background:var(--panel2); border:1px solid var(--border); color:var(--txt);
                border-radius:6px; padding:5px 8px; font-size:12px; max-width:230px; }
  #new-session { font-size:12px; padding:6px 10px; }
  main { max-width:860px; margin:0 auto; padding:18px; }
  #log { display:flex; flex-direction:column; gap:12px; min-height:50vh; }
  .msg { padding:10px 14px; border-radius:10px; max-width:80%; white-space:pre-wrap; position:relative; }
  .msg.user { align-self:flex-end; background:var(--accent); color:#fff; }
  .msg.assistant { align-self:flex-start; background:var(--panel2); border:1px solid var(--border); white-space:normal; }
  .msg.assistant p { margin:0 0 8px; } .msg.assistant p:last-child { margin-bottom:0; }
  .msg.assistant ul, .msg.assistant ol { margin:6px 0; padding-left:20px; }
  .msg.assistant code { background:var(--panel); padding:1px 5px; border-radius:4px; font-size:12.5px; }
  .msg.assistant h1,.msg.assistant h2,.msg.assistant h3 { font-size:14px; margin:8px 0 4px; }
  .msg .msg-actions { display:none; gap:6px; position:absolute; top:4px; right:6px; }
  .msg:hover .msg-actions { display:flex; }
  .msg .msg-actions button { font-size:10px; padding:2px 6px; border-radius:5px; background:rgba(0,0,0,.25);
    color:var(--txt); border:1px solid var(--border); cursor:pointer; }
  .msg.draft-preview { max-width:100%; width:100%; white-space:normal; }
  .msg.draft-preview .draft-title { font-weight:600; margin-bottom:6px; }
  .msg.draft-preview .draft-body { margin-top:10px; padding:10px 12px; background:var(--panel);
    border:1px solid var(--border); border-radius:8px; white-space:pre-wrap; line-height:1.45; }
  .chip { display:inline-block; font-size:11px; color:var(--muted); background:var(--panel);
          border:1px solid var(--border); border-radius:20px; padding:2px 10px; margin:2px 0; align-self:flex-start; }
  .chip.tool { color:var(--accent2); }
  .chip.artifact { color:var(--accent); }
  .chip.err { color:var(--danger); border-color:var(--danger); }
  /* skeleton */
  .skeleton { align-self:flex-start; width:60%; max-width:100%; }
  .skeleton .bar { height:10px; border-radius:5px; margin:7px 0;
    background:linear-gradient(90deg,var(--panel2),#262b3a,var(--panel2)); background-size:200% 100%;
    animation:shimmer 1.2s linear infinite; }
  .skeleton .bar.short { width:40%; } @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
  form#chat { display:flex; gap:8px; margin-top:16px; position:sticky; bottom:0; background:var(--bg); padding:8px 0; }
  #input { flex:1; background:var(--panel2); border:1px solid var(--border); color:var(--txt);
           border-radius:8px; padding:10px 12px; font-size:14px; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:10px 16px;
           font-size:14px; cursor:pointer; }
  button.secondary { background:var(--panel2); border:1px solid var(--border); color:var(--txt); }
  button.danger { background:var(--danger); }
  button:disabled { opacity:.45; cursor:not-allowed; }
  /* confirm modal — hidden overlay must NOT block clicks */
  #overlay { position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.6); display:none;
             align-items:center; justify-content:center; padding:20px;
             pointer-events:none; visibility:hidden; }
  #overlay.show { display:flex; pointer-events:auto; visibility:visible; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:12px; max-width:560px;
           width:100%; padding:20px; max-height:85vh; overflow:auto; }
  .modal h3 { margin:0 0 8px; }
  .modal textarea { width:100%; min-height:100px; background:var(--panel2); color:var(--txt);
    border:1px solid var(--border); border-radius:8px; padding:10px; font:inherit; resize:vertical; }
  .audience { display:inline-block; background:var(--accent2); color:#04221a; font-weight:600;
              border-radius:20px; padding:3px 12px; font-size:12px; margin:6px 0; }
  .modal ul { margin:8px 0; padding-left:18px; }
  .modal .body { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:10px; white-space:pre-wrap; }
  .modal .warn { color:var(--warn); }
  table.diff { width:100%; border-collapse:collapse; margin:10px 0; font-size:13px; }
  table.diff th, table.diff td { border:1px solid var(--border); padding:5px 8px; text-align:left; }
  .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
  .quick-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; align-self:flex-start; }
  .quick-actions button { font-size:13px; padding:8px 14px; }
  .clarify { align-self:flex-start; max-width:680px; margin:8px 0; padding:14px 16px; background:var(--panel);
    border:1px solid var(--accent); border-radius:10px; }
  .clarify .clarify-head { font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:.05em;
    font-weight:700; margin-bottom:4px; }
  .clarify .clarify-pre { color:var(--muted); font-size:13px; margin-bottom:12px; }
  .clarify .cq { margin:12px 0; }
  .clarify .cq-prompt { font-weight:600; margin-bottom:8px; line-height:1.4; }
  .clarify .cq-opt { display:flex; align-items:flex-start; gap:8px; padding:6px 8px; border:1px solid var(--border);
    border-radius:7px; margin:5px 0; cursor:pointer; font-size:13px; }
  .clarify .cq-opt:hover { border-color:var(--accent); }
  .clarify .cq-opt input { margin-top:2px; }
  .clarify .cq-other { width:100%; margin-top:6px; padding:8px 10px; border:1px solid var(--border);
    border-radius:7px; background:var(--panel2); color:inherit; font:inherit; }
  .clarify .clarify-submit { margin-top:12px; }
  .clarify.answered { border-color:var(--border); opacity:.75; }
  .quiz-q { margin:10px 0; padding:12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .quiz-q .q-num { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .quiz-q .q-stem { font-weight:500; margin:6px 0 10px; line-height:1.45; }
  .quiz-q .q-opt { padding:3px 0; font-size:13px; color:var(--muted); }
  .quiz-q .q-opt.correct { color:var(--accent2); font-weight:600; }
  .quiz-q .q-meta { font-size:11px; color:var(--muted); margin-top:8px; }
  .quiz-q .q-diagram { margin:4px 0 10px; padding:0; }
  .quiz-q .q-diagram img { display:block; max-width:100%; max-height:320px; border-radius:8px;
    border:1px solid var(--border); background:#fff; }
  .quiz-q .q-diagram figcaption { font-size:11px; color:var(--muted); margin-top:4px; }
  .quiz-q .q-diagram.missing img { display:none; }
  .quiz-q .q-diagram.missing figcaption::after { content:" (preview unavailable)"; color:var(--warn); }
  .quiz-q .q-cite { font-size:11px; color:var(--muted); margin-top:6px; padding:8px; background:var(--panel2);
    border-radius:6px; border-left:3px solid var(--accent); }
  .rubric { margin-top:8px; font-size:12px; }
  .rubric table { width:100%; border-collapse:collapse; }
  .rubric th, .rubric td { border:1px solid var(--border); padding:3px 6px; text-align:left; color:var(--muted); }
  .draft-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; padding-top:12px;
    border-top:1px solid var(--border); }
  .draft-actions button { font-size:13px; padding:8px 14px; }
  .q-edit-actions { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; padding-top:8px;
    border-top:1px dashed var(--border); align-items:center; }
  .q-edit-actions button, .q-edit-actions select { font-size:11px; padding:4px 8px; border-radius:6px;
    background:var(--panel2); color:var(--txt); border:1px solid var(--border); cursor:pointer; }
  .q-edit-actions button:hover { border-color:var(--accent); }
  .q-edit-actions button.q-danger { color:var(--danger); }
  .q-edit-actions .q-spacer { flex:1; }
  #meta-banner { display:none; padding:6px 18px; background:var(--panel2); border-bottom:1px solid var(--border);
    font-size:12px; color:var(--muted); flex-wrap:wrap; gap:8px; align-items:center; }
  #meta-banner.show { display:flex; }
  #meta-banner .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px;
    background:var(--panel); border:1px solid var(--border); color:var(--txt); }
  #meta-banner .badge.warn { border-color:var(--danger); color:var(--danger); }
  .files-wrap { margin-top:6px; }
  .files { display:flex; gap:8px; align-items:center; flex-wrap:wrap; color:var(--muted); font-size:12px; }
  #file-list { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .file-row { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:12px; }
  .file-row .file-head { display:flex; gap:8px; align-items:baseline; flex-wrap:wrap; }
  .file-row .file-name { font-weight:600; color:var(--txt); }
  .file-row .file-id { color:var(--muted); font-size:11px; }
  .file-row .file-rm { margin-left:auto; background:transparent; border:0; color:var(--muted); cursor:pointer;
    font-size:13px; padding:0 4px; } .file-row .file-rm:hover { color:var(--danger); }
  .file-row .file-phase { color:var(--muted); margin-top:4px; }
  .file-progress { height:4px; background:var(--panel2); border-radius:2px; margin-top:6px; overflow:hidden; }
  .file-progress > div { height:100%; background:var(--accent); transition:width .3s; }
  .diagram-badge { display:inline-block; font-size:10px; padding:1px 6px; border-radius:10px; margin-left:6px; }
  .diagram-badge.complete { background:#0d3328; color:var(--accent2); }
  .diagram-badge.skipped { background:var(--panel2); color:var(--muted); }
  .diagram-badge.failed { background:#3d1a12; color:var(--danger); }
  .diagram-badge.pending { background:#2a2410; color:var(--warn); }
  .diagram-thumbs { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .diagram-thumb { width:80px; text-align:center; }
  .diagram-thumb img { width:80px; height:60px; object-fit:contain; background:var(--panel2);
    border:1px solid var(--border); border-radius:4px; }
  .diagram-thumb .cap { font-size:10px; color:var(--muted); margin-top:2px; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; max-width:80px; }
  .lecture-controls { display:flex; gap:10px; align-items:center; margin-top:6px; font-size:12px; flex-wrap:wrap; }
  .lecture-controls select, .lecture-controls input { background:var(--panel2); border:1px solid var(--border);
    color:var(--txt); border-radius:6px; padding:4px 8px; font-size:12px; }
  .lecture-controls input[type=text] { width:130px; }
  .video-preview { margin-top:8px; max-width:320px; }
  .video-preview video { width:100%; border-radius:8px; border:1px solid var(--border); }
  .quiz-q .q-bloom[data-higher="1"] { color:var(--warn); font-weight:600; }
  .provenance-badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px;
    background:var(--panel); border:1px solid var(--border); color:var(--muted); margin-left:8px; }
  .draft-knobs { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:10px 0; font-size:12px; }
  .draft-knobs select { background:var(--panel2); border:1px solid var(--border); color:var(--txt);
    border-radius:6px; padding:4px 8px; }
  .source-modal .body { max-height:40vh; overflow:auto; font-size:13px; line-height:1.5; }
  /* empty-state onboarding */
  #empty { text-align:center; color:var(--muted); padding:40px 10px; }
  #empty h2 { color:var(--txt); font-size:16px; margin:0 0 6px; }
  #empty .examples { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:16px; }
  #empty .examples button { font-size:13px; padding:8px 14px; background:var(--panel2); border:1px solid var(--border); color:var(--txt); }
  /* toasts */
  #toasts { position:fixed; top:14px; right:14px; z-index:1100; display:flex; flex-direction:column; gap:8px; max-width:340px; }
  .toast { background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--accent);
    border-radius:8px; padding:10px 12px; font-size:13px; box-shadow:0 6px 20px rgba(0,0,0,.4); cursor:pointer; }
  .toast.err { border-left-color:var(--danger); } .toast.warn { border-left-color:var(--warn); }
  /* editable draft fields */
  .editable-field { width:100%; background:var(--panel2); color:var(--txt); border:1px solid var(--border);
    border-radius:8px; padding:8px 10px; font:inherit; }
  .editable-field.body { min-height:90px; resize:vertical; }
  /* artifacts panel (taggable files + drafts) */
  .artifacts-wrap { margin-top:12px; }
  .artifacts-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  #artifacts-toggle { font-size:12px; padding:6px 12px; }
  .artifacts-hint { color:var(--muted); font-size:11px; }
  .artifacts-hint b { color:var(--accent); }
  #artifacts-list { display:none; flex-direction:column; gap:6px; margin-top:8px; }
  #artifacts-list.show { display:flex; }
  .artifacts-group { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:6px; }
  .artifact-item { display:flex; align-items:center; gap:8px; padding:7px 10px; background:var(--panel);
    border:1px solid var(--border); border-radius:8px; font-size:12px; }
  .artifact-item .a-title { font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .artifact-item .a-id { color:var(--muted); font-size:10px; }
  .artifact-item button.a-tag { font-size:11px; padding:3px 9px; }
  .artifact-item.tagged { border-color:var(--accent2); }
  .artifact-item.tagged button.a-tag { background:var(--accent2); color:#04221a; }
  /* @-mention dropdown */
  #mention-pop { position:absolute; bottom:calc(100% + 6px); left:0; right:0; max-height:240px; overflow:auto;
    background:var(--panel); border:1px solid var(--accent); border-radius:10px;
    box-shadow:0 -6px 24px rgba(0,0,0,.5); display:none; z-index:900; }
  #mention-pop.show { display:block; }
  .mention-item { display:flex; align-items:center; gap:8px; padding:8px 12px; cursor:pointer; font-size:13px;
    border-bottom:1px solid var(--border); }
  .mention-item:last-child { border-bottom:0; }
  .mention-item.active, .mention-item:hover { background:var(--panel2); }
  .mention-item .m-title { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mention-item .m-type { font-size:10px; color:var(--muted); margin-left:auto; text-transform:uppercase; }
  .mention-empty { padding:10px 12px; color:var(--muted); font-size:12px; }
  /* tagged-reference chips above the input */
  #ref-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  #ref-chips:empty { display:none; }
  .ref-chip { display:inline-flex; align-items:center; gap:6px; font-size:12px; background:var(--panel2);
    border:1px solid var(--accent); border-radius:16px; padding:3px 6px 3px 10px; color:var(--txt); }
  .ref-chip button { background:transparent; border:0; color:var(--muted); cursor:pointer; padding:0 2px; font-size:13px; }
  .ref-chip button:hover { color:var(--danger); }
  @media (max-width:600px) {
    .cfg { width:100%; } .cfg input { flex:1 1 120px; width:auto; }
    main { padding:12px; } .msg { max-width:92%; }
    .draft-actions button, .quick-actions button { flex:1 1 auto; }
  }
</style>
</head>
<body>
<header>
  <h1>mooKIT AI Assistant</h1>
  <span class="sub">sample chat · "we make suggestions, you make decisions"</span>
  <div class="cfg">
    <input id="cfg-base" placeholder="service URL" value="" title="Auto-filled from this page's host when served at /ui" />
    <input id="cfg-course" placeholder="course" value="coursetest" />
    <input id="cfg-uid" placeholder="uid" value="1" />
    <input id="cfg-token" placeholder="token (JWT)" value="" />
    <select id="session-picker" title="Reopen a previous chat"><option value="">▾ Recent chats</option></select>
    <button class="secondary" id="new-session" title="Start a fresh conversation">New chat</button>
  </div>
</header>
<div id="meta-banner"></div>
<main>
  <div id="log"></div>
  <div class="files-wrap">
    <div class="files">
      <input type="file" id="file" multiple accept=".pdf,.docx,.pptx,.xlsx,.csv,.txt,.mp4,.mov,.webm,.mkv,.m4v" />
      <button class="secondary" id="upload">Upload</button>
      <span id="file-status"></span>
    </div>
    <div id="file-list"></div>
    <div class="lecture-controls">
      <label for="lecture-week">Lecture week:</label>
      <select id="lecture-week"></select>
      <label for="lecture-module">Module:</label>
      <select id="lecture-module"><option value="">(optional)</option></select>
      <label for="lecture-release">Release:</label>
      <input type="datetime-local" id="lecture-release" title="Leave blank to publish immediately" />
    </div>
  </div>
  <div class="artifacts-wrap">
    <div class="artifacts-head">
      <button type="button" class="secondary" id="artifacts-toggle" aria-expanded="false">📚 Artifacts (<span id="artifacts-count">0</span>)</button>
      <span class="artifacts-hint">your files &amp; drafts this session — type <b>@</b> in the message box to tag one</span>
    </div>
    <div id="artifacts-list"></div>
  </div>
  <div id="ref-chips"></div>
  <form id="chat">
    <div id="mention-pop"></div>
    <input id="input" placeholder="e.g. Create a quiz from this PDF · Cancel today's class · Publish this under Week 4 · @ to tag a file/draft" autocomplete="off" />
    <button type="button" class="secondary danger" id="cancel" style="display:none">Cancel</button>
    <button id="send" type="submit">Send</button>
  </form>
</main>

<div id="toasts"></div>
<div id="overlay"><div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"></div></div>

<script>
const $ = (id) => document.getElementById(id);
const log = $("log");
let sessionId = "";
let uploadedFiles = [];  // { id, name, kind, textReady, diagramsReady, ready, chunks, diagrams, localBlobUrl?, rowEl? }
let chatAbort = null;
let appMeta = null;
let offeredActionsKey = "";
let lastUserText = "";
let draftArtifacts = [];  // { id, title, type, version } — drafts seen via artifact_updated this session
let pendingRefs = [];     // { id, title, type } — artifacts @-tagged for the next message

// ---- Permissions ------------------------------------------------------------
// appMeta.permissions = { resource: [actions...] }. When unknown (not loaded / not enforced),
// default to allowed so the UI stays usable in dev.
function can(resource, action) {
  const perms = appMeta && appMeta.permissions;
  if (!perms || typeof perms !== "object") return true;
  const list = perms[resource];
  if (!Array.isArray(list)) return true;
  return list.includes(action);
}
function gate(btn, resource, action, why) {
  if (!btn) return btn;
  if (!can(resource, action)) {
    btn.disabled = true;
    btn.title = why || `Requires ${resource}:${action} permission`;
  }
  return btn;
}

function isPdfName(name) { return /\.pdf$/i.test(name || ""); }
function isVideoName(name) { return /\.(mp4|mov|webm|mkv|m4v)$/i.test(name || ""); }
function lookupFileName(id) { const f = uploadedFiles.find((x) => x.id === id); return f ? f.name : id; }

// ---- Artifacts registry (taggable files + drafts) --------------------------
const ARTIFACT_META = {
  uploaded_file:      { icon: "📄", label: "Files" },
  assessment_draft:   { icon: "📝", label: "Quizzes" },
  announcement_draft: { icon: "📣", label: "Announcements" },
  lecture_draft:      { icon: "🎬", label: "Lectures" },
};
function artifactIcon(type) { return (ARTIFACT_META[type] || {}).icon || "📦"; }

// Unified, current-session view of everything the instructor can @-tag.
function allArtifacts() {
  const files = uploadedFiles
    .filter((f) => !String(f.id).startsWith("pending-"))
    .map((f) => ({ id: f.id, title: f.name, type: "uploaded_file", ready: !!f.textReady }));
  return files.concat(draftArtifacts.map((a) => ({ ...a, ready: true })));
}
function artifactById(id) { return allArtifacts().find((a) => a.id === id); }

function draftTitle(d) {
  return (d.preview && d.preview.title)
    || (d.payload && d.payload.title)
    || (String(d.type || "").replace("_draft", "") + " draft");
}
function upsertDraftArtifact(d) {
  if (!d || !d.artifact_id) return;
  const entry = { id: d.artifact_id, title: draftTitle(d), type: d.type, version: d.version };
  const idx = draftArtifacts.findIndex((a) => a.id === entry.id);
  if (idx >= 0) draftArtifacts[idx] = { ...draftArtifacts[idx], ...entry };
  else draftArtifacts.push(entry);
  // Keep any active tag chip label in sync with the latest version/title.
  const ref = pendingRefs.find((r) => r.id === entry.id);
  if (ref) { ref.title = entry.title; renderRefChips(); }
  renderArtifactsPanel();
}

function renderArtifactsPanel() {
  const list = $("artifacts-list");
  const all = allArtifacts();
  const countEl = $("artifacts-count");
  if (countEl) countEl.textContent = String(all.length);
  if (!list) return;
  if (!all.length) {
    list.innerHTML = '<div class="mention-empty">No files or drafts yet — upload a file or create a draft and it shows up here.</div>';
    return;
  }
  const groups = {};
  for (const a of all) (groups[a.type] = groups[a.type] || []).push(a);
  let html = "";
  for (const type of Object.keys(ARTIFACT_META)) {
    const items = groups[type];
    if (!items || !items.length) continue;
    html += `<div class="artifacts-group">${escapeHtml(ARTIFACT_META[type].label)}</div>`;
    for (const a of items) {
      const tagged = pendingRefs.some((r) => r.id === a.id);
      html +=
        `<div class="artifact-item${tagged ? " tagged" : ""}">` +
        `<span>${artifactIcon(a.type)}</span>` +
        `<span class="a-title" title="${escapeHtml(a.title)}">${escapeHtml(a.title)}</span>` +
        `<span class="a-id">${escapeHtml(String(a.id).slice(0, 8))}…</span>` +
        `<button type="button" class="secondary a-tag" data-tag="${escapeHtml(a.id)}">${tagged ? "✓ tagged" : "@ tag"}</button>` +
        `</div>`;
    }
  }
  list.innerHTML = html;
  list.querySelectorAll("button.a-tag").forEach((b) => { b.onclick = () => toggleRef(b.dataset.tag); });
}

// ---- Tagged references (the unambiguous "picked up" confirmation) ----------
function addRef(id) {
  if (pendingRefs.some((r) => r.id === id)) return;
  const a = artifactById(id);
  if (!a) return;
  pendingRefs.push({ id: a.id, title: a.title, type: a.type });
  renderRefChips(); renderArtifactsPanel();
}
function removeRef(id) {
  pendingRefs = pendingRefs.filter((r) => r.id !== id);
  renderRefChips(); renderArtifactsPanel();
}
function toggleRef(id) {
  if (pendingRefs.some((r) => r.id === id)) removeRef(id);
  else addRef(id);
}
function renderRefChips() {
  const bar = $("ref-chips");
  if (!bar) return;
  bar.innerHTML = "";
  for (const r of pendingRefs) {
    const chip = document.createElement("span");
    chip.className = "ref-chip";
    const label = document.createElement("span");
    label.textContent = artifactIcon(r.type) + " @" + r.title;
    chip.appendChild(label);
    const x = document.createElement("button");
    x.type = "button"; x.textContent = "✕"; x.title = "remove tag";
    x.onclick = () => removeRef(r.id);
    chip.appendChild(x);
    bar.appendChild(chip);
  }
}

// ---- @-mention autocomplete on the chat input ------------------------------
let mentionActive = -1;
function currentMentionQuery() {
  const inp = $("input");
  const pos = inp.selectionStart ?? inp.value.length;
  const upto = inp.value.slice(0, pos);
  const m = upto.match(/(?:^|\s)@([^\s@]*)$/);
  return m ? { query: m[1], start: pos - m[1].length - 1, end: pos } : null;
}
function mentionCandidates(query) {
  const q = (query || "").toLowerCase();
  return allArtifacts()
    .filter((a) => a.title.toLowerCase().includes(q) && !pendingRefs.some((r) => r.id === a.id))
    .slice(0, 8);
}
function showMentionPop() {
  const pop = $("mention-pop");
  const ctx = currentMentionQuery();
  if (!ctx) { hideMentionPop(); return; }
  const cands = mentionCandidates(ctx.query);
  mentionActive = cands.length ? 0 : -1;
  if (!cands.length) {
    pop.innerHTML = '<div class="mention-empty">No matching files or drafts</div>';
  } else {
    pop.innerHTML = cands.map((a, i) =>
      `<div class="mention-item${i === 0 ? " active" : ""}" data-aid="${escapeHtml(a.id)}">` +
      `<span>${artifactIcon(a.type)}</span>` +
      `<span class="m-title">${escapeHtml(a.title)}</span>` +
      `<span class="m-type">${escapeHtml(a.type.replace("_draft", ""))}</span></div>`
    ).join("");
    pop.querySelectorAll(".mention-item").forEach((el) => {
      el.onmousedown = (e) => { e.preventDefault(); pickMention(el.dataset.aid); };
    });
  }
  pop.classList.add("show");
  pop._ctx = ctx;
  pop._cands = cands;
}
function hideMentionPop() {
  const p = $("mention-pop");
  p.classList.remove("show");
  p._ctx = null; p._cands = null; mentionActive = -1;
}
function highlightMention() {
  const items = $("mention-pop").querySelectorAll(".mention-item");
  items.forEach((el, i) => el.classList.toggle("active", i === mentionActive));
  items[mentionActive]?.scrollIntoView({ block: "nearest" });
}
function pickMention(id) {
  const inp = $("input");
  const ctx = $("mention-pop")._ctx;
  addRef(id);
  // Strip the partial "@query" text so the chip bar is the single source of truth.
  if (ctx) {
    const before = inp.value.slice(0, ctx.start);
    const after = inp.value.slice(inp.selectionStart ?? inp.value.length);
    inp.value = before + after;
    const newPos = before.length;
    inp.setSelectionRange(newPos, newPos);
  }
  hideMentionPop();
  inp.focus();
}

function diagramImageUrl(fileId, diagramFile) {
  return baseUrl() + "/v1/files/" + encodeURIComponent(fileId) + "/diagrams/" + encodeURIComponent(diagramFile);
}
async function fetchDiagramBlobUrl(fileId, diagramFile) {
  const r = await fetch(diagramImageUrl(fileId, diagramFile), { headers: headers() });
  if (!r.ok) return null;
  const blob = await r.blob();
  return URL.createObjectURL(blob);
}
// Load the cropped figure attached to each quiz question (auth headers can't ride on <img src>,
// so we fetch the PNG as a blob and swap it in). Best-effort: a missing figure just stays blank.
async function loadQuestionDiagrams(card) {
  const imgs = card.querySelectorAll("img.q-diagram-img[data-file]");
  for (const img of imgs) {
    if (img.dataset.loaded) continue;
    img.dataset.loaded = "1";
    try {
      const url = await fetchDiagramBlobUrl(img.dataset.file, img.dataset.diag);
      if (url) img.src = url; else img.closest(".q-diagram")?.classList.add("missing");
    } catch (_) {
      img.closest(".q-diagram")?.classList.add("missing");
    }
  }
}

function headers(extra={}) {
  return Object.assign({
    "course": $("cfg-course").value.trim(),
    "uid": $("cfg-uid").value.trim(),
    "token": $("cfg-token").value.trim(),
    "x-session-id": sessionId,
  }, extra);
}
function baseUrl() { return $("cfg-base").value.trim().replace(/\/$/, ""); }

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// ---- Safe minimal markdown (escape-first; no raw HTML, no links → anti-exfil) ----
function renderMarkdown(src) {
  const lines = String(src || "").split("\n");
  let html = "", listType = null;
  const closeList = () => { if (listType) { html += `</${listType}>`; listType = null; } };
  const inline = (t) => escapeHtml(t)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
  for (const raw of lines) {
    const line = raw.trimEnd();
    let m;
    if ((m = line.match(/^(#{1,3})\s+(.*)$/))) { closeList(); html += `<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`; }
    else if ((m = line.match(/^\s*[-*]\s+(.*)$/))) { if (listType !== "ul") { closeList(); html += "<ul>"; listType = "ul"; } html += `<li>${inline(m[1])}</li>`; }
    else if ((m = line.match(/^\s*\d+\.\s+(.*)$/))) { if (listType !== "ol") { closeList(); html += "<ol>"; listType = "ol"; } html += `<li>${inline(m[1])}</li>`; }
    else if (line.trim() === "") { closeList(); }
    else { closeList(); html += `<p>${inline(line)}</p>`; }
  }
  closeList();
  return html;
}

// ---- Toasts + centralized error surfacing ----------------------------------
function toast(msg, kind="") {
  const t = document.createElement("div");
  t.className = "toast " + kind;
  t.textContent = msg;
  t.onclick = () => t.remove();
  $("toasts").appendChild(t);
  setTimeout(() => t.remove(), 6500);
}
function friendlyError(status, detail, context) {
  const d = detail ? (": " + detail) : "";
  if (status === 401) return "Not authenticated — paste a fresh mooKIT JWT in the token field (or ?token=… in the URL).";
  if (status === 403) return "Permission denied — check the course short-name, a current token, and matching uid" + d;
  if (status === 413) return "File too large" + (appMeta?.limits?.maxFileSizeBytes ? ` (max ${Math.round(appMeta.limits.maxFileSizeBytes/1048576)} MB)` : "") + ".";
  if (status === 400) return (context ? context + " — " : "") + "rejected" + d;
  if (status === 404) return (context || "Resource") + " not found.";
  if (status >= 500) return "Service error" + d + " — please retry.";
  return (context || "Request failed") + (status ? ` (HTTP ${status})` : "") + d;
}
function surfaceError(status, detail, context) {
  const msg = friendlyError(status, detail, context);
  toast(msg, status === 401 || status === 403 ? "warn" : "err");
  addChip(msg, "err");
}

function clearEmptyState() { const e = $("empty"); if (e) e.remove(); }

function addMsg(role, text="") {
  clearEmptyState();
  const el = document.createElement("div");
  el.className = "msg " + role;
  el._raw = text;
  if (role === "assistant") el.innerHTML = renderMarkdown(text); else el.textContent = text;
  // hover actions
  const bar = document.createElement("div");
  bar.className = "msg-actions";
  if (role === "assistant") {
    const c = document.createElement("button"); c.textContent = "copy";
    c.onclick = () => { navigator.clipboard?.writeText(el._raw || el.textContent); toast("copied"); };
    bar.appendChild(c);
  } else {
    const rt = document.createElement("button"); rt.textContent = "retry";
    rt.onclick = () => sendChatMessage(el._raw || el.textContent);
    const ed = document.createElement("button"); ed.textContent = "edit";
    ed.onclick = () => { $("input").value = el._raw || el.textContent; $("input").focus(); };
    bar.appendChild(rt); bar.appendChild(ed);
  }
  el.appendChild(bar);
  log.appendChild(el);
  scrollLog();
  return el;
}
function setAssistantText(el, text) { el._raw = text; el.innerHTML = renderMarkdown(text); }

function addChip(text, kind="") {
  clearEmptyState();
  const el = document.createElement("div");
  el.className = "chip " + kind;
  el.textContent = text;
  log.appendChild(el);
  scrollLog();
  return el;
}
function scrollLog() {
  window.requestAnimationFrame(() => log.lastElementChild?.scrollIntoView({block:"nearest", behavior:"smooth"}));
}

function addQuickActions(buttons) {
  const row = document.createElement("div");
  row.className = "quick-actions";
  for (const b of buttons) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = b.secondary ? "secondary" : "";
    btn.textContent = b.label;
    if (b.resource) gate(btn, b.resource, b.action);
    btn.onclick = () => sendChatMessage(b.message);
    row.appendChild(btn);
  }
  log.appendChild(row);
  scrollLog();
}

// ---- Clarifying questions (agent → instructor) -------------------------
// The agent pauses the turn to ask. We render selectable options (+ free-text "Other"),
// then compose the selection into a normal chat message that auto-continues the task.
function showClarification(d) {
  clearEmptyState();
  const questions = Array.isArray(d.questions) ? d.questions : [];
  if (!questions.length) return;
  const card = document.createElement("div");
  card.className = "clarify";
  let html = '<div class="clarify-head">A quick question</div>';
  if (d.preamble) html += `<div class="clarify-pre">${escapeHtml(d.preamble)}</div>`;
  questions.forEach((q, qi) => {
    const name = `cq_${qi}`;
    const inputType = q.allow_multiple ? "checkbox" : "radio";
    html += `<div class="cq" data-qid="${escapeHtml(q.id || name)}" data-prompt="${escapeHtml(q.prompt || "")}">`;
    html += `<div class="cq-prompt">${escapeHtml(q.prompt || "")}</div>`;
    (q.options || []).forEach((o, oi) => {
      const id = `${name}_${oi}`;
      html += `<label class="cq-opt" for="${id}">`
        + `<input type="${inputType}" name="${name}" id="${id}" value="${escapeHtml(o.label || o.id || "")}">`
        + `<span>${escapeHtml(o.label || o.id || "")}</span></label>`;
    });
    if (q.allow_free_text !== false) {
      html += `<input type="text" class="cq-other" name="${name}" placeholder="Other — type your own answer">`;
    }
    html += `</div>`;
  });
  html += '<div class="clarify-submit"><button type="button">Submit answer</button></div>';
  card.innerHTML = html;

  card.querySelector(".clarify-submit button").onclick = () => {
    const lines = [];
    let answered = false;
    card.querySelectorAll(".cq").forEach((cq) => {
      const prompt = cq.dataset.prompt || "";
      const picked = [];
      cq.querySelectorAll('input[type="radio"]:checked, input[type="checkbox"]:checked')
        .forEach((i) => { if (i.value.trim()) picked.push(i.value.trim()); });
      const other = cq.querySelector(".cq-other");
      if (other && other.value.trim()) picked.push(other.value.trim());
      if (picked.length) answered = true;
      lines.push(`${prompt} ${picked.join("; ") || "(no preference)"}`.trim());
    });
    if (!answered) { toast("Pick an option or type an answer"); return; }
    card.classList.add("answered");
    card.querySelectorAll("input, button").forEach((el) => { el.disabled = true; });
    sendChatMessage(lines.join("\n"));
  };

  log.appendChild(card);
  scrollLog();
}

// ---- File upload + indexing status -------------------------------------
function upsertFileEntry(entry) {
  const idx = uploadedFiles.findIndex((f) => f.id === entry.id);
  if (idx >= 0) {
    const prev = uploadedFiles[idx];
    uploadedFiles[idx] = { ...prev, ...entry, rowEl: entry.rowEl || prev.rowEl };
  } else uploadedFiles.push(entry);
  renderFileRow(uploadedFiles.find((f) => f.id === entry.id));
  renderArtifactsPanel();
  if (entry.textReady) offerFileActions();
}

function renderFileRow(f) {
  if (!f) return;
  const list = $("file-list");
  let row = f.rowEl;
  if (!row) {
    row = document.createElement("div");
    row.className = "file-row";
    row.dataset.fileId = f.id;
    f.rowEl = row;
    list.appendChild(row);
  }
  const pct = f.progressPct ?? (f.textReady && f.diagramsReady ? 100 : f.progressPct ?? 0);
  let badge = "";
  if (f.kind === "document" && f.textReady) {
    if (!f.diagramsReady) badge = '<span class="diagram-badge pending">diagrams…</span>';
    else if (f.diagrams?.status === "complete") badge = `<span class="diagram-badge complete">${f.diagrams.total_diagrams} diagram(s)</span>`;
    else if (f.diagrams?.status === "skipped") badge = '<span class="diagram-badge skipped">no diagrams</span>';
    else if (f.diagrams?.status === "failed") badge = '<span class="diagram-badge failed">diagram error</span>';
  }
  let thumbs = "";
  if (f.diagramsReady && f.diagrams?.diagrams?.length) {
    thumbs = '<div class="diagram-thumbs" data-thumbs-for="' + escapeHtml(f.id) + '">Loading previews…</div>';
  }
  let videoBlock = "";
  if (f.kind === "video" && f.localBlobUrl) {
    videoBlock = `<div class="video-preview"><video controls src="${f.localBlobUrl}"></video></div>`;
  }
  const idShort = String(f.id).startsWith("pending-") ? "" : `<span class="file-id">${escapeHtml(String(f.id).slice(0, 8))}…</span>`;
  const rmBtn = `<button class="file-rm" title="Remove file" data-rm="${escapeHtml(f.id)}">✕</button>`;
  row.innerHTML =
    `<div class="file-head"><span class="file-name">${escapeHtml(f.name)}</span>` +
    `${idShort}${badge}${rmBtn}</div>` +
    `<div class="file-phase">${escapeHtml(f.phaseText || "waiting…")}</div>` +
    (pct != null && f.kind === "document" ? `<div class="file-progress"><div style="width:${Math.min(100, pct)}%"></div></div>` : "") +
    (f.uploadPct != null ? `<div class="file-progress"><div style="width:${f.uploadPct}%"></div></div>` : "") +
    videoBlock + thumbs;
  const rm = row.querySelector(".file-rm");
  if (rm) rm.onclick = () => removeFile(f.id);
  if (f.diagramsReady && f.diagrams?.diagrams?.length) loadDiagramThumbs(f);
}

async function removeFile(fileId) {
  const f = uploadedFiles.find((x) => x.id === fileId);
  const persisted = f && !String(fileId).startsWith("pending-");
  if (persisted) {
    try {
      const r = await fetch(baseUrl() + "/v1/files/" + encodeURIComponent(fileId), { method: "DELETE", headers: headers() });
      if (!r.ok) { let j={}; try{j=await r.json();}catch{} surfaceError(r.status, j.detail, "delete file"); return; }
    } catch (e) { surfaceError(0, e.message, "delete file"); return; }
  }
  f?.rowEl?.remove();
  if (f?.localBlobUrl) URL.revokeObjectURL(f.localBlobUrl);
  uploadedFiles = uploadedFiles.filter((x) => x.id !== fileId);
  pendingRefs = pendingRefs.filter((r) => r.id !== fileId);
  offeredActionsKey = "";  // allow re-offering with the new file set
  updateFilesPanelSummary();
  renderRefChips();
  renderArtifactsPanel();
  toast("removed " + (f ? f.name : fileId));
}

async function loadDiagramThumbs(f) {
  const container = f.rowEl?.querySelector(".diagram-thumbs");
  if (!container || container.dataset.loaded) return;
  container.dataset.loaded = "1";
  container.innerHTML = "";
  for (const d of f.diagrams.diagrams) {
    const wrap = document.createElement("div");
    wrap.className = "diagram-thumb";
    const img = document.createElement("img");
    img.alt = d.diagram_description || "diagram";
    img.title = d.question_text || "";
    wrap.appendChild(img);
    const cap = document.createElement("div");
    cap.className = "cap";
    cap.textContent = "p" + d.page_number + (d.question_number ? " · " + d.question_number : "");
    wrap.appendChild(cap);
    container.appendChild(wrap);
    try {
      const url = await fetchDiagramBlobUrl(f.id, d.diagram_file);
      if (url) img.src = url;
    } catch (_) { /* non-fatal */ }
  }
}

function updateFilesPanelSummary() {
  const textReady = uploadedFiles.filter((f) => f.textReady);
  if (!textReady.length) {
    $("file-status").textContent = uploadedFiles.length ? "processing…" : "no files yet";
    return;
  }
  $("file-status").textContent = textReady.length + " file(s) text-ready";
}

function registerReadyFile(entry) {
  upsertFileEntry(Object.assign({ ready: Boolean(entry.textReady) }, entry));
  updateFilesPanelSummary();
}

function offerQuizActions(readyDocs) {
  if (!readyDocs.length) return;
  const pendingDiagrams = readyDocs.filter((f) => isPdfName(f.name) && !f.diagramsReady);
  if (pendingDiagrams.length) {
    addChip("ℹ️ Quiz can be created; diagram images attach at publish when extraction finishes.", "artifact");
  }
  if (readyDocs.length === 1) {
    const f = readyDocs[0];
    addQuickActions([
      { label: "Create quiz from " + f.name, message: `Create a quiz from file ${f.id} (${f.name})`, resource: "assessments", action: "create" },
    ]);
    return;
  }
  const ids = readyDocs.map((f) => f.id).join(", ");
  const names = readyDocs.map((f) => f.name).join(", ");
  addQuickActions([
    { label: "Create quiz from all " + readyDocs.length + " files", message: `Create a quiz from these files: ${ids} (${names})`, resource: "assessments", action: "create" },
    ...readyDocs.map((f) => ({ label: "Quiz from " + f.name + " only", message: `Create a quiz from file ${f.id} (${f.name})`, secondary: true, resource: "assessments", action: "create" })),
  ]);
}

function _selectedLabel(id) {
  const sel = $(id);
  const opt = sel?.selectedOptions?.[0];
  return (opt?.dataset?.name || opt?.textContent || "").trim();
}
function lectureMessageFor(v) {
  const weekLabel = _selectedLabel("lecture-week") || "Week 4";
  const moduleLabel = $("lecture-module")?.value ? _selectedLabel("lecture-module") : "";
  const release = $("lecture-release").value;
  let msg = `Publish this video lecture under ${weekLabel}`;
  if (moduleLabel) msg += ` in module "${moduleLabel}"`;
  if (release) msg += ` scheduled for ${release}`;
  msg += ` — file ${v.id} (${v.name})`;
  return msg;
}
function offerLectureActions(readyVideos) {
  for (const v of readyVideos) {
    addQuickActions([
      { label: "Publish " + v.name + " as a lecture", message: lectureMessageFor(v), resource: "lectures", action: "create" },
    ]);
  }
}

function offerFileActions() {
  const key = uploadedFiles.map((f) => f.id + ":" + (f.textReady ? "1" : "0")).join("|");
  if (key === offeredActionsKey) return;
  offeredActionsKey = key;
  const textReady = uploadedFiles.filter((f) => f.textReady);
  const readyDocs = textReady.filter((f) => f.kind === "document");
  const readyVideos = textReady.filter((f) => f.kind === "video");
  if (readyVideos.length) offerLectureActions(readyVideos);
  if (readyDocs.length) offerQuizActions(readyDocs);
}

async function pollFileStatus(fileId, name, kind) {
  if (kind === "video") return;
  upsertFileEntry({ id: fileId, name, kind: "document", textReady: false, diagramsReady: false, phaseText: "uploaded — waiting for indexing…" });
  const maxAttempts = 180;
  let textReadyAnnounced = false;
  for (let i = 0; i < maxAttempts; i++) {
    await new Promise((r) => setTimeout(r, 1000));
    if (!uploadedFiles.some((f) => f.id === fileId)) return;  // removed mid-poll
    try {
      const r = await fetch(baseUrl() + "/v1/files/" + fileId + "/status", { headers: headers() });
      const st = await r.json();
      const data = st.data || st;
      const status = data.extractionStatus || "unknown";
      const pct = data.progress?.pct;
      const msg = data.progress?.message || "";
      const diagrams = data.diagrams;
      const textReady = status === "indexed" || data.ready;
      const diagramsReady = diagrams != null || (data.progress?.pct === 100) || (data.progress?.status === "complete");
      const phaseText = status + (pct != null ? " " + pct + "%" : "") + (msg ? " — " + msg : "");
      upsertFileEntry({
        id: fileId, name, kind: "document", textReady, diagramsReady, ready: textReady,
        chunks: data.chunkCount, diagrams, progressPct: pct, phaseText,
      });
      if (textReady && !textReadyAnnounced) {
        textReadyAnnounced = true;
        const n = data.chunkCount ?? "?";
        addChip("✅ " + name + " indexed — " + n + " text chunks ready", "artifact");
      }
      if (diagramsReady) {
        if (diagrams?.status === "complete" && diagrams.total_diagrams > 0) {
          addChip("🖼 " + name + " — " + diagrams.total_diagrams + " diagram(s) extracted", "artifact");
        }
        return;
      }
      if (status === "failed") {
        addChip("❌ indexing failed for " + name + (msg ? ": " + msg : ""), "err");
        return;
      }
    } catch (e) {
      upsertFileEntry({ id: fileId, name, phaseText: "status check failed" });
      return;
    }
  }
  upsertFileEntry({ id: fileId, name, phaseText: "still processing (poll timed out)" });
}

function uploadOneFileXHR(f) {
  return new Promise((resolve, reject) => {
    const kind = isVideoName(f.name) ? "video" : "document";
    const fd = new FormData();
    fd.append("file", f);
    const xhr = new XMLHttpRequest();
    xhr.open("POST", baseUrl() + "/v1/files");
    const h = headers();
    for (const [k, v] of Object.entries(h)) xhr.setRequestHeader(k, v);
    xhr.upload.onprogress = (ev) => {
      if (ev.lengthComputable) {
        const pct = Math.round((ev.loaded / ev.total) * 100);
        upsertFileEntry({ id: "pending-" + f.name, name: f.name, kind, uploadPct: pct, phaseText: "uploading " + pct + "%…" });
      }
    };
    xhr.onload = () => {
      let j;
      try { j = JSON.parse(xhr.responseText); } catch { reject({ status: xhr.status, detail: "invalid response" }); return; }
      if (xhr.status >= 400) { reject({ status: xhr.status, detail: j.detail || xhr.statusText }); return; }
      resolve({ f, j: j.data || j, kind });
    };
    xhr.onerror = () => reject({ status: 0, detail: "network error" });
    xhr.send(fd);
  });
}

async function uploadOneFile(f) {
  const kind = isVideoName(f.name) ? "video" : "document";
  const localBlobUrl = kind === "video" ? URL.createObjectURL(f) : null;
  const { j } = await uploadOneFileXHR(f);
  const fileId = j.fileId || j.artifact?.id;
  const fileKind = j.fileKind || kind;
  uploadedFiles = uploadedFiles.filter((x) => !String(x.id).startsWith("pending-"));
  $("file-list").querySelectorAll('[data-file-id^="pending-"]').forEach((el) => el.remove());
  if (fileKind === "video" || j.ready) {
    registerReadyFile({ id: fileId, name: f.name, textReady: true, diagramsReady: true, kind: "video", localBlobUrl, phaseText: "stored — ready to publish" });
    addChip("🎬 video stored: " + f.name + " (id " + fileId + ") — ready to publish as lecture", "artifact");
  } else {
    upsertFileEntry({ id: fileId, name: f.name, kind: "document", phaseText: "uploaded — waiting for text extraction…" });
    addChip("📎 uploaded " + f.name + " (id " + fileId + ") — waiting for text extraction…", "artifact");
    pollFileStatus(fileId, f.name, "document");
  }
}

const ALLOWED_EXT = [".pdf",".docx",".pptx",".xlsx",".csv",".txt",".mp4",".mov",".webm",".mkv",".m4v"];
function precheckFile(f) {
  const ext = "." + (f.name.split(".").pop() || "").toLowerCase();
  const allowed = (appMeta?.allowedFileTypes || ALLOWED_EXT);
  if (!allowed.includes(ext)) return `unsupported type "${ext}" (allowed: ${allowed.join(", ")})`;
  const max = appMeta?.limits?.maxFileSizeBytes;
  if (max && f.size > max) return `too large: ${Math.round(f.size/1048576)} MB (max ${Math.round(max/1048576)} MB)`;
  return null;
}

$("upload").onclick = async () => {
  const files = [...($("file").files || [])];
  if (!files.length) { $("file-status").textContent = "choose one or more files first"; return; }
  // Pre-check before sending a single byte.
  for (const f of files) {
    const err = precheckFile(f);
    if (err) { surfaceError(400, err, "upload " + f.name); return; }
  }
  $("file-status").textContent = "uploading " + files.length + " file(s)…";
  $("upload").disabled = true;
  try {
    for (const f of files) await uploadOneFile(f);
    $("file").value = "";
  } catch (e) {
    const status = e.status ?? 0, detail = e.detail || e.message;
    $("file-status").textContent = "upload failed";
    surfaceError(status, detail, "upload");
    uploadedFiles = uploadedFiles.filter((x) => !String(x.id).startsWith("pending-"));
    $("file-list").querySelectorAll('[data-file-id^="pending-"]').forEach((el) => el.remove());
  }
  finally { $("upload").disabled = false; updateFilesPanelSummary(); }
};

// ---- Live course taxonomy (week / module / section) ------------------------
// Populated from GET /v1/taxonomy so the UI never hardcodes Week 1–16 or invents sections.
let appTaxonomy = { week: [], module: [], section: [] };
let taxonomyLoaded = false;

function _fillSelect(sel, terms, { placeholder = null } = {}) {
  if (!sel) return;
  sel.innerHTML = "";
  if (placeholder !== null) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = placeholder;
    sel.appendChild(opt);
  }
  for (const t of terms) {
    const opt = document.createElement("option");
    opt.value = String(t.id);          // term id (resolved server-side)
    opt.dataset.name = t.name;         // human label for message/preview
    opt.textContent = t.name;
    sel.appendChild(opt);
  }
}

// Reflect taxonomy availability in the lecture controls — disable publish-by-week when a course
// has no weeks configured rather than silently sending an unresolved label.
function applyTaxonomyState() {
  const weekSel = $("lecture-week");
  const hasWeeks = (appTaxonomy.week || []).length > 0;
  if (weekSel) weekSel.disabled = !hasWeeks;
  const ctrls = document.querySelector(".lecture-controls");
  let hint = $("lecture-taxonomy-hint");
  if (!hasWeeks && taxonomyLoaded) {
    if (!hint && ctrls) {
      hint = document.createElement("span");
      hint.id = "lecture-taxonomy-hint";
      hint.style.cssText = "color:var(--danger);font-size:12px";
      hint.textContent = "No weeks configured in this course — add them in mooKIT first";
      ctrls.appendChild(hint);
    }
  } else if (hint) {
    hint.remove();
  }
}

async function loadTaxonomy() {
  try {
    const r = await fetch(baseUrl() + "/v1/taxonomy", { headers: headers() });
    if (!r.ok) { taxonomyLoaded = true; applyTaxonomyState(); return; }
    const st = await r.json();
    const data = st.data || st;
    appTaxonomy = {
      week: data.week || [],
      module: data.module || [],
      section: data.section || [],
    };
    taxonomyLoaded = true;
    _fillSelect($("lecture-week"), appTaxonomy.week);
    _fillSelect($("lecture-module"), appTaxonomy.module, { placeholder: "(optional)" });
    // Default the week selector to "Week 4" when present (keeps the old demo default), else first.
    const weekSel = $("lecture-week");
    if (weekSel && appTaxonomy.week.length) {
      const wk4 = appTaxonomy.week.find((t) => /\bweek\s*4\b/i.test(t.name));
      weekSel.value = String((wk4 || appTaxonomy.week[0]).id);
    }
    applyTaxonomyState();
  } catch (_) { taxonomyLoaded = true; applyTaxonomyState(); }
}

// ---- Modal infrastructure (focus trap, Esc, restore focus) -----------------
let _modalPrevFocus = null;
let _modalOnClose = null;
function openModal(onClose) {
  _modalPrevFocus = document.activeElement;
  _modalOnClose = onClose || null;
  $("overlay").classList.add("show");
  const focusable = $("modal").querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  // Focus the FIRST focusable — that's the Cancel button (or a text input), the safe default for
  // a publish/delete confirmation, so a stray Enter never triggers the destructive action.
  (focusable[0] || $("modal")).focus?.();
  $("overlay").onclick = (e) => { if (e.target === $("overlay")) closeModal(true); };
}
function closeModal(viaCancel) {
  $("overlay").classList.remove("show");
  $("overlay").onclick = null;
  const cb = _modalOnClose; _modalOnClose = null;
  if (viaCancel && cb) cb();
  _modalPrevFocus?.focus?.();
  _modalPrevFocus = null;
}
document.addEventListener("keydown", (e) => {
  if (!$("overlay").classList.contains("show")) return;
  if (e.key === "Escape") { e.preventDefault(); closeModal(true); return; }
  if (e.key === "Tab") {  // focus trap
    const f = [...$("modal").querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')].filter((el) => !el.disabled && el.offsetParent !== null);
    if (!f.length) return;
    const first = f[0], last = f[f.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
});

// Themed text-input modal (replaces native prompt()). Resolves to string or null.
function promptModal(title, initial, { multiline=false } = {}) {
  return new Promise((resolve) => {
    const m = $("modal");
    const field = multiline
      ? `<textarea id="pm-input">${escapeHtml(initial || "")}</textarea>`
      : `<input class="editable-field" id="pm-input" value="${escapeHtml(initial || "")}" />`;
    m.innerHTML = `<h3 id="modal-title">${escapeHtml(title)}</h3>${field}
      <div class="actions"><button class="secondary" id="pm-cancel">Cancel</button><button id="pm-ok">OK</button></div>`;
    let done = false;
    const finish = (val) => { if (done) return; done = true; resolve(val); closeModal(false); };
    openModal(() => finish(null));
    $("pm-input").focus();
    $("pm-cancel").onclick = () => finish(null);
    $("pm-ok").onclick = () => { const v = $("pm-input").value; finish(v); };
  });
}
function confirmModal(title, message) {
  return new Promise((resolve) => {
    const m = $("modal");
    m.innerHTML = `<h3 id="modal-title">${escapeHtml(title)}</h3><p>${escapeHtml(message || "")}</p>
      <div class="actions"><button class="secondary" id="cm-cancel">Cancel</button><button class="danger" id="cm-ok">Delete</button></div>`;
    let done = false;
    const finish = (val) => { if (done) return; done = true; resolve(val); closeModal(false); };
    openModal(() => finish(false));
    $("cm-cancel").onclick = () => finish(false);
    $("cm-ok").onclick = () => finish(true);
  });
}

function unixToLocalInput(ts) {
  if (!ts) return "";
  const d = new Date(ts * 1000);
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function localInputToUnix(v) {
  if (!v) return null;
  const ms = new Date(v).getTime();
  return Number.isNaN(ms) ? null : Math.floor(ms / 1000);
}

// Read + validate the quiz settings form → a ReviseAssessmentBody, or null with a toast on error.
function readQuizSettings() {
  const start = localInputToUnix($("cf-q-start")?.value);

  const results = localInputToUnix($("cf-q-results")?.value);

function showConfirm(d) {

  let html = `<h3 id="modal-title">${d.action === "send_announcement" ? "Review & send announcement" : escapeHtml(p.title || d.action)}</h3>`;
  if (p.audience) html += `<div class="audience">To: ${escapeHtml(p.audience)}</div>`;
  if (p.summary_lines && p.summary_lines.length)

  if (p.body_markdown && d.action !== "send_announcement") html += `<div class="body">${escapeHtml(p.body_markdown)}</div>`;
  if (p.diff && p.diff.length) {
    html += `<table class="diff"><tr><th>Field</th><th>Before</th><th>After</th></tr>` +
      p.diff.map(r=>`<tr><td>${escapeHtml(r.field)}</td><td>${escapeHtml(String(r.before??"—"))}</td><td>${escapeHtml(String(r.after??"—"))}</td></tr>`).join("") +
      `</table>`;
  }
  if (p.warnings && p.warnings.length)
    html += "<ul class='warn'>" + p.warnings.map(w=>`<li>⚠ ${escapeHtml(w)}</li>`).join("") + "</ul>";
  if (d.action === "send_announcement") {
    const subj = (p.title || "").replace(/^Send announcement:\s*/i, "");
    const body = p.body_markdown || "";
    html += `<p style="color:var(--muted);font-size:13px;margin:12px 0 8px">Edit the announcement below, then send or cancel. This is exactly what will be posted to mooKIT.</p>`;
    html += `<div style="font-size:12px;color:var(--muted);margin-top:8px">Subject</div>`;
    html += `<input class="editable-field" id="cf-ann-subj" value="${escapeHtml(subj)}" />`;
    html += `<div style="font-size:12px;color:var(--muted);margin-top:10px">Body</div>`;
    html += `<textarea class="editable-field body" id="cf-ann-body">${escapeHtml(body)}</textarea>`;
    html += announcementControls(d.settings);
  }
  if (d.action === "publish_assessment") {
    html += `<p style="color:var(--muted);font-size:13px;margin:12px 0 8px">Configure the settings below, then publish. This is exactly what will be created on mooKIT (with the questions from your draft above).</p>`;

  }

    html += `<p style="color:var(--muted);font-size:13px;margin:12px 0 0">This uploads the video to mooKIT (if needed), creates the lecture, and attaches the video. Review the week/title above before confirming.</p>`;
  const confirmLabel = d.action === "publish_assessment" ? "Publish quiz"
    : d.action === "publish_lecture" ? "Publish lecture"

  html += `<div class="actions">
      <button class="secondary" id="btn-reject">Cancel</button>
      <button id="btn-confirm">${confirmLabel}</button></div>`;
  m.innerHTML = html;
  let done = false;
  const finish = (ok) => {
    if (done) return;
    // Gather + validate any revise body BEFORE closing the modal so a validation error keeps it open.
    let reviseBody = null;
    if (ok && d.action === "send_announcement") {
      const title = ($("cf-ann-subj")?.value || "").trim();
      const description = ($("cf-ann-body")?.value || "").trim();
      if (!title || !description) { toast("Subject and body are required", "warn"); return; }
      reviseBody = readAnnouncementSettings({ title, description });
      if (reviseBody === null) return;  // schedule validation failed; keep modal open
    } else if (ok && d.action === "publish_assessment") {
      reviseBody = readQuizSettings();

    }
    done = true;
    closeModal(false);

  $("btn-confirm").onclick = () => finish(true);

  const timedBox = $("cf-q-timed");
  if (timedBox) timedBox.addEventListener("change", () => { const dur = $("cf-q-duration"); if (dur) dur.disabled = !timedBox.checked; });

  if (d.action === "send_announcement") {

    if (schedBox) schedBox.addEventListener("change", () => { const w = $("cf-ann-when"); if (w) w.disabled = !schedBox.checked; });
  }
}
async function resolveAction(d, confirm, reviseBody) {
  const verb = confirm ? "confirm" : "reject";
  const reviseLabel = d.action === "publish_assessment" ? "revise quiz settings" : "revise announcement";
  try {
    if (confirm && reviseBody) {
      const rr = await fetch(`${baseUrl()}/v1/actions/${d.action_id}/revise`, {
        method: "POST",
        headers: headers({ "Content-Type": "application/json" }),
        body: JSON.stringify(reviseBody),
      });
      const rj = await rr.json().catch(() => ({}));
      if (!rr.ok) { surfaceError(rr.status, rj.detail, reviseLabel); return; }
    }
    const r = await fetch(`${baseUrl()}/v1/actions/${d.action_id}/${verb}`, {
      method:"POST", headers: headers({"Content-Type":"application/json"}),
      body: JSON.stringify(confirm ? { confirm_token: d.confirm_token } : {}),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) { surfaceError(r.status, j.detail, d.action); return; }
    const payload = j.data || j;
    if (confirm && d.action === "send_announcement" && payload && payload.title) {
      addChip(`✅ Announcement sent (id ${payload.id}): "${payload.title}"`, "artifact");
    } else if (confirm && d.action === "publish_assessment") {
      const title = (payload && payload.title) || (d.preview && d.preview.title) || "quiz";
      addChip(`✅ Quiz published to mooKIT: "${title}"`, "artifact");
    } else if (confirm && d.action === "publish_lecture") {
      const title = (payload && payload.title) || (d.preview && d.preview.title) || "lecture";
      const lid = payload && (payload.id ?? payload.lectureId);
      addChip(`✅ Lecture published to mooKIT${lid ? " (id " + lid + ")" : ""}: "${title}"`, "artifact");
    } else {
      addChip(confirm ? `✅ ${d.action} confirmed` : `🚫 ${d.action} cancelled`, confirm ? "artifact":"");
    }
  } catch (e) { surfaceError(0, e.message, d.action); }
}

function getDiagramAttachSummary() {
  const parts = uploadedFiles
    .filter((f) => f.diagrams?.status === "complete" && f.diagrams.total_diagrams > 0)
    .map((f) => `${f.diagrams.total_diagrams} diagram(s) from ${f.name}`);
  return parts.length ? parts.join("; ") + " will be attached." : "";
}

function showSourceModal(cite) {
  const m = $("modal");
  let html = `<h3 id="modal-title">Source citation</h3>`;
  if (cite.source_doc_id)
    html += `<p style="color:var(--muted);font-size:12px">Document: ${escapeHtml(lookupFileName(cite.source_doc_id))} (${escapeHtml(cite.source_doc_id)})</p>`;
  html += `<div class="body source-modal">${escapeHtml(cite.quote || "")}</div>`;
